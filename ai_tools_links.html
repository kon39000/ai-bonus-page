<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIツール一覧表 - 購入者特典</title>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff758c;
            --primary-light: #ff7eb3;
            --secondary: #6ee2f5;
            --bg-color: #fceef5;
            --text-main: #333333;
            --text-muted: #666666;
            --card-bg: rgba(255, 255, 255, 0.85);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
        }
        .shape-1 {
            top: -10%; left: -10%;
            width: 300px; height: 300px;
            background: var(--primary-light);
        }
        .shape-2 {
            bottom: 10%; right: -5%;
            width: 250px; height: 250px;
            background: var(--secondary);
        }

        header {
            text-align: center;
            padding: 40px 20px 30px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.3);
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        h1 {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            font-size: 1.35rem;
            color: #ff5277;
            margin-bottom: 12px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            line-height: 1.4;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .tool-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 24px 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.02);
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .tool-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.06);
        }

        .tool-name {
            font-family: 'M PLUS Rounded 1c', sans-serif;
            font-weight: 700;
            font-size: 1.15rem;
            color: var(--text-main);
            margin-bottom: 16px;
        }

        .link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'M PLUS Rounded 1c', sans-serif;
            box-shadow: 0 4px 15px rgba(255, 117, 140, 0.3);
            transition: transform 0.1s, box-shadow 0.2s, opacity 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .link-btn:active, .link-btn:hover {
            opacity: 0.9;
        }
        .link-btn:active {
            transform: scale(0.98);
        }

        .back-btn-container {
            text-align: center;
            margin-top: 40px;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 24px;
            background: #fff;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        
        .icon {
            margin-left: 8px;
        }
    </style>
</head>
<body>

    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <header>
        <h1>AIツール一覧表</h1>
        <div class="subtitle">「フリーランス1年生ですが、AIで月収＋10万円アップする方法を教えてください！」<br>書籍で紹介した主なAIツールへのリンク集です。</div>
    </header>

    <div class="container">
        
        <div class="tool-card">
            <div class="tool-name">ChatGPT</div>
            <a href="https://chat.openai.com/" target="_blank" rel="noopener" class="link-btn">
                サイトを開く <span class="icon">🔗</span>
            </a>
        </div>

        <div class="tool-card">
            <div class="tool-name">Gemini</div>
            <a href="https://gemini.google.com/" target="_blank" rel="noopener" class="link-btn">
                サイトを開く <span class="icon">🔗</span>
            </a>
        </div>

        <div class="tool-card">
            <div class="tool-name">Copilot（旧Bing）</div>
            <a href="https://copilot.microsoft.com/" target="_blank" rel="noopener" class="link-btn">
                サイトを開く <span class="icon">🔗</span>
            </a>
        </div>

        <div class="tool-card">
            <div class="tool-name">Canva AI（Magic Media）</div>
            <a href="https://www.canva.com/magic-studio/magic-media" target="_blank" rel="noopener" class="link-btn">
                サイトを開く <span class="icon">🔗</span>
            </a>
        </div>

        <div class="tool-card">
            <div class="tool-name">Adobe Firefly</div>
            <a href="https://www.adobe.com/products/firefly.html" target="_blank" rel="noopener" class="link-btn">
                サイトを開く <span class="icon">🔗</span>
            </a>
        </div>

        <div class="tool-card">
            <div class="tool-name">Midjourney</div>
            <a href="https://www.midjourney.com/" target="_blank" rel="noopener" class="link-btn">
                サイトを開く <span class="icon">🔗</span>
            </a>
        </div>

    </div>

</body>
</html>
